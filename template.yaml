AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Plataforma serverless de feedbacks para o Tech Challenge Fase 4.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: '^[a-z0-9-]+$'
    Description: Nome do ambiente usado no stage da API e nas tags.
  AdminEmail:
    Type: String
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    Description: E-mail do administrador que recebera alertas criticos e relatorios semanais.

Globals:
  Function:
    Runtime: java21
    Architectures:
      - arm64
    MemorySize: 512
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        FEEDBACK_TABLE_NAME: !Ref FeedbackTable
        REPORT_TIME_ZONE: America/Sao_Paulo
    Tags:
      Application: tech-challenge-fase-04
      Environment: !Ref EnvironmentName

Resources:
  FeedbackApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${AWS::StackName}-feedback-api
      RetentionInDays: 30

  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  FeedbackApi:
    Type: AWS::Serverless::Api
    DependsOn:
      - ApiGatewayAccount
    Properties:
      StageName: !Ref EnvironmentName
      TracingEnabled: true
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: true
        AddApiKeyRequiredToCorsPreflight: false
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: !Sub ${AWS::StackName}-${EnvironmentName}-usage-plan
          Throttle:
            BurstLimit: 50
            RateLimit: 20
          Quota:
            Limit: 10000
            Period: MONTH
          Tags:
            - Key: Application
              Value: tech-challenge-fase-04
            - Key: Environment
              Value: !Ref EnvironmentName
      AccessLogSetting:
        DestinationArn: !GetAtt FeedbackApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          MetricsEnabled: true
          LoggingLevel: INFO
          DataTraceEnabled: false
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 20

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-${EnvironmentName}-feedbacks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: tech-challenge-fase-04
        - Key: Environment
          Value: !Ref EnvironmentName

  CriticalFeedbackTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-${EnvironmentName}-critical-feedback
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Protocol: email
          Endpoint: !Ref AdminEmail
      Tags:
        - Key: Application
          Value: tech-challenge-fase-04
        - Key: Environment
          Value: !Ref EnvironmentName

  WeeklyReportTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-${EnvironmentName}-weekly-report
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Protocol: email
          Endpoint: !Ref AdminEmail
      Tags:
        - Key: Application
          Value: tech-challenge-fase-04
        - Key: Environment
          Value: !Ref EnvironmentName

  ReceiveFeedbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: com.viniciuspadovam.tcquatro.receivefeedback.ReceiveFeedbackHandler::handleRequest
      Description: Recebe avaliacoes, persiste no DynamoDB e dispara alerta para feedback critico.
      Environment:
        Variables:
          URGENT_FEEDBACK_TOPIC_ARN: !Ref CriticalFeedbackTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt FeedbackTable.Arn
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref CriticalFeedbackTopic
      Events:
        ReceiveFeedbackApi:
          Type: Api
          Properties:
            RestApiId: !Ref FeedbackApi
            Path: /{proxy+}
            Method: POST
            Auth:
              ApiKeyRequired: true

  WeeklyReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: com.viniciuspadovam.tcquatro.weeklyreport.WeeklyReportHandler::handleRequest
      Description: Gera e envia o relatorio semanal de feedbacks.
      Timeout: 60
      Environment:
        Variables:
          WEEKLY_REPORT_TOPIC_ARN: !Ref WeeklyReportTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !GetAtt FeedbackTable.Arn
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref WeeklyReportTopic
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Name: !Sub ${AWS::StackName}-${EnvironmentName}-weekly-report
            Description: Executa toda segunda-feira ao meio-dia UTC.
            Schedule: cron(0 12 ? * MON *)
            Enabled: true

  ReceiveFeedbackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ReceiveFeedbackFunction}
      RetentionInDays: 30

  WeeklyReportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${WeeklyReportFunction}
      RetentionInDays: 30

  ReceiveFeedbackErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Erros na Lambda de recebimento de feedbacks.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReceiveFeedbackFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  WeeklyReportErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Erros na Lambda de relatorio semanal.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WeeklyReportFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-${EnvironmentName}-feedbacks
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${ReceiveFeedbackFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Duration", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "ReceiveFeedback"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${WeeklyReportFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Duration", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "WeeklyReport"
              }
            }
          ]
        }

Outputs:
  ApiBaseUrl:
    Description: URL base da API. Acrescente /avaliacao ao final.
    Value: !Sub https://${FeedbackApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}
  ApiKeyId:
    Description: ID da API key. Use aws apigateway get-api-key --include-value para obter o valor.
    Value: !Ref FeedbackApiApiKey
  FeedbackTableName:
    Description: Tabela DynamoDB que armazena os feedbacks.
    Value: !Ref FeedbackTable
  CriticalFeedbackTopicArn:
    Description: Topico SNS usado para alertas de feedback critico.
    Value: !Ref CriticalFeedbackTopic
  WeeklyReportTopicArn:
    Description: Topico SNS usado para envio do relatorio semanal.
    Value: !Ref WeeklyReportTopic
